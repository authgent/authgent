<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize — authgent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: #e5e5e5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 1rem;
        }
        .card {
            background: #171717; border: 1px solid #262626;
            border-radius: 12px; padding: 2rem; max-width: 420px; width: 100%;
        }
        .logo { font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem; }
        .logo span { color: #3b82f6; }
        h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .desc { color: #a3a3a3; font-size: 0.875rem; margin-bottom: 1.5rem; line-height: 1.5; }
        .info { background: #1e1e1e; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
        .info-row { display: flex; justify-content: space-between; padding: 0.25rem 0; font-size: 0.85rem; }
        .info-label { color: #737373; }
        .info-value { color: #e5e5e5; font-weight: 500; }
        .scopes { margin-bottom: 1.5rem; }
        .scopes h3 { font-size: 0.85rem; color: #a3a3a3; margin-bottom: 0.5rem; }
        .scope-tag {
            display: inline-block; background: #1e3a5f; color: #60a5fa;
            padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem;
            margin: 0.2rem 0.2rem 0.2rem 0;
        }
        .buttons { display: flex; gap: 0.75rem; }
        .btn {
            flex: 1; padding: 0.7rem; border: none; border-radius: 8px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-deny { background: #262626; color: #e5e5e5; }
        .btn-allow { background: #3b82f6; color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">auth<span>gent</span></div>
        <h1>Authorization Request</h1>
        <p class="desc">
            <strong>{{ client_name }}</strong> is requesting access to
            <strong>{{ resource }}</strong> on your behalf.
        </p>
        <div class="info">
            <div class="info-row">
                <span class="info-label">Application</span>
                <span class="info-value">{{ client_name }}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Resource</span>
                <span class="info-value">{{ resource }}</span>
            </div>
        </div>
        <div class="scopes">
            <h3>Requested permissions</h3>
            {% for scope in scopes %}
            <span class="scope-tag">{{ scope }}</span>
            {% endfor %}
        </div>
        <form method="POST" action="/authorize">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="client_id" value="{{ client_id }}">
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
            <input type="hidden" name="scope" value="{{ scope }}">
            <input type="hidden" name="resource" value="{{ resource }}">
            <input type="hidden" name="state" value="{{ state }}">
            <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
            <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">
            <input type="hidden" name="response_type" value="{{ response_type }}">
            {% if nonce %}
            <input type="hidden" name="nonce" value="{{ nonce }}">
            {% endif %}
            <div class="buttons">
                <button type="submit" name="action" value="deny" class="btn btn-deny">Deny</button>
                <button type="submit" name="action" value="allow" class="btn btn-allow">Allow</button>
            </div>
        </form>
    </div>
</body>
</html>
