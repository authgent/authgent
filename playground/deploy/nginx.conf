# nginx config for demo.authgent.dev
# Place at /etc/nginx/sites-available/authgent-demo

# Rate limiting: 10 req/min per IP
limit_req_zone $binary_remote_addr zone=authgent_demo:10m rate=10r/m;

server {
    listen 80;
    server_name demo.authgent.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name demo.authgent.dev;

    # TLS (Let's Encrypt — run certbot first)
    ssl_certificate /etc/letsencrypt/live/demo.authgent.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.authgent.dev/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS for playground
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Handle CORS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Playground static page
    location / {
        root /opt/authgent/playground;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy to authgent-server
    location ~ ^/(token|register|agents|revoke|introspect|authorize|device|stepup|health|ready|docs|openapi.json) {
        limit_req zone=authgent_demo burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # .well-known endpoints
    location /.well-known/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
